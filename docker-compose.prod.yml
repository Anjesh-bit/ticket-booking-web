version: "3.8"

# Usage: npm run docker:prod
# OR:    docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  app:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
    ports:
      - "80:80"
    depends_on:
      - app
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  postgres:
    restart: always

    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
