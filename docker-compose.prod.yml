services:
  app:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: production
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      target: production
    ports:
      - "80:80"
    depends_on:
      - app
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  postgres:
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
